<!DOCTYPE html>
<html>
  <head>
    <title>Netlify Form Detection</title>
  </head>
  <body>
    <!-- Static mirror of the Contact form so @netlify/plugin-nextjs v5
         can detect it at build time. Field names must match the values
         submitted by src/components/sections/Contact.tsx. -->
    <form name="contact" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="subject" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
